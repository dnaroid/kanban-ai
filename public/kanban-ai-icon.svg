<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background card -->
  <rect x="64" y="96" width="384" height="320" rx="24" fill="#f8fafc" stroke="#e2e8f0" stroke-width="4" />

  <!-- Kanban columns -->
  <rect x="96" y="144" width="96" height="240" rx="12" fill="#e0e7ff" fill-opacity="0.5" />
  <rect x="208" y="144" width="96" height="240" rx="12" fill="#e0e7ff" fill-opacity="0.5" />
  <rect x="320" y="144" width="96" height="240" rx="12" fill="#e0e7ff" fill-opacity="0.5" />

  <!-- Task cards -->
  <rect x="112" y="168" width="64" height="48" rx="8" fill="#6366f1" filter="url(#glow)" />
  <rect x="224" y="192" width="64" height="48" rx="8" fill="#8b5cf6" filter="url(#glow)" />
  <rect x="336" y="224" width="64" height="48" rx="8" fill="#a78bfa" filter="url(#glow)" />
  <rect x="112" y="280" width="64" height="48" rx="8" fill="#7c3aed" filter="url(#glow)" />
  <rect x="224" y="304" width="64" height="48" rx="8" fill="#8b5cf6" filter="url(#glow)" />

  <!-- AI network overlay -->
  <circle cx="144" cy="352" r="8" fill="#6366f1" />
  <circle cx="256" cy="320" r="12" fill="#7c3aed" filter="url(#glow)" />
  <circle cx="368" cy="352" r="8" fill="#8b5cf6" />

  <!-- Connection lines -->
  <line x1="144" y1="352" x2="256" y2="320" stroke="#6366f1" stroke-width="3" stroke-linecap="round" />
  <line x1="256" y1="320" x2="368" y2="352" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" />
  <line x1="256" y1="320" x2="256" y2="256" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-dasharray="8,4" />

  <!-- AI brain icon -->
  <g transform="translate(256, 80)">
    <circle cx="0" cy="0" r="48" fill="url(#aiGradient)" filter="url(#glow)" />
    <path d="M-16 0 Q-8 -16 0 0 Q8 -16 16 0" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" />
    <path d="M-16 8 Q-8 -8 0 8 Q8 -8 16 8" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" />
    <circle cx="0" cy="-12" r="6" fill="white" />
    <circle cx="-12" cy="8" r="4" fill="white" />
    <circle cx="12" cy="8" r="4" fill="white" />
  </g>

  <!-- Subtle flow arrows -->
  <path d="M176 192 Q200 192 208 200" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <path d="M288 216 Q310 216 320 224" stroke="#94a3b8" stroke-width="2" fill="none" />

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>